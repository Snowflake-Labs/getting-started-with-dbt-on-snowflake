name: dbt_CD

on:
  push:
    branches: [main]

jobs:
  deploy_and_archive_state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"

      - name: Create Snowflake Config
        run: |
          mkdir -p ~/.snowflake
          cat <<EOF > ~/.snowflake/config.toml
          [connections.default]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_raw = """${{ secrets.SNOWFLAKE_PRIVATE_KEY }}"""
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          database = "tasty_bytes_dbt_db"
          schema = "PUBLIC"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Install dbt Dependencies
        run: |
          cd tasty_bytes_dbt_demo
          dbt deps

      - name: Deploy Project to Snowflake
        run: |
          snow dbt deploy tasty_bytes \
            --source tasty_bytes_dbt_demo \
            --profiles-dir tasty_bytes_dbt_demo \
            --force

      - name: Full Production Build
        # In CD, we run the full project to ensure Production is 100% synced
        run: |
          snow dbt execute tasty_bytes build --empty

      - name: Ensure Stage Exists
        run: |
          snow sql -q "CREATE SCHEMA IF NOT EXISTS TASTY_BYTES_DBT_DB.OPERATIONS; CREATE STAGE IF NOT EXISTS TASTY_BYTES_DBT_DB.OPERATIONS.DBT_ARTIFACTS DIRECTORY = (ENABLE = TRUE);"
          
      - name: Archive Production Manifest
        run: |
          # 1. Use 'snow dbt execute' with 'compile' to ensure 
          # the Snowflake CLI connection is used (fixing the password error)
          snow dbt execute tasty_bytes compile --source tasty_bytes_dbt_demo

          # 2. Upload the manifest
          # The file is generated in the project's target folder
          snow stage copy tasty_bytes_dbt_demo/target/manifest.json @TASTY_BYTES_DBT_DB.OPERATIONS.DBT_ARTIFACTS \
            --overwrite
